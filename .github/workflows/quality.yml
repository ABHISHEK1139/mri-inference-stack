name: Quality Checks

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Python compile smoke check
        run: python -m compileall app.py train.py config.py data models training evaluation scripts

      - name: Preflight structural check
        run: python scripts/preflight.py --ci-mode
