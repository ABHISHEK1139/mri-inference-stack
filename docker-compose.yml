version: "3.9"

services:
  mri-app:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mri-intelligence-app
    ports:
      - "8501:8501"
    environment:
      - LOW_VRAM_MODE=1
      - GPU_MEMORY_GB=4
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ./weights:/app/weights
      - ./outputs:/app/outputs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

