apiVersion: apps/v1
kind: Deployment
metadata:
  name: mri-intelligence-app
  namespace: mri-intelligence
  labels:
    app: mri-intelligence
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: mri-intelligence
  template:
    metadata:
      labels:
        app: mri-intelligence
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mri-app
          image: mri-intelligence:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: mri-intelligence-config
          env:
            - name: STREAMLIT_SERVER_ADDRESS
              value: 0.0.0.0
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: weights-volume
              mountPath: /app/weights
            - name: outputs-volume
              mountPath: /app/outputs
      volumes:
        - name: weights-volume
          hostPath:
            path: /tmp/mri-intelligence/weights
            type: DirectoryOrCreate
        - name: outputs-volume
          hostPath:
            path: /tmp/mri-intelligence/outputs
            type: DirectoryOrCreate

